#:schema https://developers.openai.com/codex/config-schema.json

# QA-oriented Codex baseline
# Copy into a business project and tune as needed.

approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

persistent_instructions = "Follow project AGENTS.md guidelines. Optimize for QA/test lead workflows: source-based impact analysis, risk-based regression, automation-first prioritization, and release readiness decisions."

[mcp_servers.github]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
startup_timeout_sec = 30

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 30

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--extension"]
startup_timeout_sec = 30

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]
startup_timeout_sec = 30

[mcp_servers.memory]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-memory"]
startup_timeout_sec = 30

[features]
multi_agent = true

[profiles.strict]
approval_policy = "on-request"
sandbox_mode = "read-only"
web_search = "cached"

[profiles.fast]
approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "cached"

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for evidence gathering and impact analysis."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "QA-oriented reviewer for regression risk, missing tests, and release blockers."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist for SDK, OS, browser, and framework behavior."
config_file = "agents/docs-researcher.toml"
